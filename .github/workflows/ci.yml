name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '22'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --ignore-scripts

      - name: Build core
        run: cd packages/core && pnpm exec tsc

      - name: Run tests
        run: pnpm run test

      - name: Xolito aprueba el build
        run: echo "Orale, compilo y los tests pasaron. No siempre la riegas, manito."
